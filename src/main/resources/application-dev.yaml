spring:
  application:
    name: smallgroups

  datasource:
    url: jdbc:h2:file:./H2Database/smallgroups;MODE=PostgreSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
#    url: jdbc:h2:mem:smallgroups;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
    initialization-mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      platform: h2

testconfig: true