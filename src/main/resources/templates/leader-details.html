<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leader Details</title>
    <th:block th:insert="~{fragments/css-links :: cssLinks}"></th:block>
    <style>
        .profile-card {
            padding: 8px;
        }
        .profile-row {
            display: grid;
            grid-template-columns: 170px 1fr;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 16px;
        }
        .profile-row:last-child {
            border-bottom: none;
        }
        .profile-label {
            margin: 0;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--muted);
            font-weight: 700;
        }
        .profile-value {
            margin: 0;
            font-size: 1rem;
            color: var(--text);
            font-weight: 600;
            word-break: break-word;
        }
        .muted-value {
            color: var(--muted);
            font-weight: 500;
        }
        @media (max-width: 720px) {
            .profile-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<th:block th:insert="~{fragments/navbar :: navbar('manageLeaders')}"></th:block>
<main class="page-shell">
    <section class="page-header">
        <span class="eyebrow"><i class="fa-solid fa-user-tie"></i> Leader Management</span>
        <h1 th:text="${leader != null ? leader.firstName + ' ' + leader.lastName : 'Leader Details'}">Leader Details</h1>
        <p>Full details for this leader.</p>
        <a href="/leaders" class="btn btn-outline-light btn-sm mt-3">
            <i class="fa-solid fa-arrow-left me-1"></i> Back to Leaders
        </a>
        <button class="btn btn-danger btn-sm mt-3 ms-2">
            <i class="fa-solid fa-user-minus me-1"></i> Remove Leader
        </button>
    </section>

    <section class="profile-card" aria-label="Leader details" th:if="${leader != null}">
        <div class="profile-row">
            <p class="profile-label">Member ID</p>
            <p class="profile-value muted-value" th:text="${leader.id}">0</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">First Name</p>
            <p class="profile-value" th:text="${leader.firstName}">First</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Last Name</p>
            <p class="profile-value" th:text="${leader.lastName}">Last</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Email</p>
            <p class="profile-value" th:text="${leader.email}">email@example.com</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Mobile Phone</p>
            <p class="profile-value" th:text="${leader.mobilePhone ?: 'Not provided'}">Not provided</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Home Phone</p>
            <p class="profile-value" th:text="${leader.homePhone ?: 'Not provided'}">Not provided</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Church ID</p>
            <p class="profile-value muted-value" th:text="${leader.churchId}">0</p>
        </div>
    </section>

    <section th:if="${leader == null}" class="profile-card">
        <p class="text-center text-muted py-4">Leader not found.</p>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
