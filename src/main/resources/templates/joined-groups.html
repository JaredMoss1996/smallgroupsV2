<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joined Groups</title>

    <th:block th:insert="~{fragments/css-links :: cssLinks}"></th:block>
    <th:block th:insert="~{fragments/group-card :: groupCardStyles}"></th:block>

</head>
<body>
<th:block th:insert="~{fragments/navbar :: navbar('joinedGroups')}"></th:block>

<div id="overlay" onclick="closePreview()">
    <div id="preview">
        <button type="button" class="btn-close preview-close-btn" aria-label="Close"
                onclick="event.stopPropagation(); closePreview();"></button>
        <div id="preview-inner"></div>
    </div>
</div>

<main class="page-shell">
    <section class="page-header">
        <span class="eyebrow"><i class="fa-solid fa-hand-fist"></i> Your Groups</span>
        <h1>Joined Groups</h1>
        <p>
            View all the groups you've joined. Click any group card to see more details or take action.
        </p>
    </section>

    <section class="toolbar">
        <div>
            <p class="results-count">[[${groups.size}]] Results</p>
            <p class="toolbar-copy">Groups you're currently a member of.</p>
        </div>
    </section>

    <section class="groups-card" aria-label="Joined groups list">
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-2 results-grid">
            <div class="col" th:each="group : ${groups}" th:object="${group}">
                <th:block th:insert="~{fragments/group-card :: groupCard(${group}, false)}"></th:block>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/directory.js}"></script>
</body>

</html>
