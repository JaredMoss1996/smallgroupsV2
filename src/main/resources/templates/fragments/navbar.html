<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <th:block th:fragment="navbarCss">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <style>
            .sg-navbar {
                background: #10171a;
                box-shadow: 0 6px 18px rgba(15, 22, 27, .25);
            }

            .sg-navbar .navbar-brand {
                color: #fff;
                font-weight: 700;
                letter-spacing: .01em;
            }

            .sg-navbar .navbar-brand:hover,
            .sg-navbar .navbar-brand:focus {
                color: #fff;
            }

            .sg-navbar .nav-link {
                color: rgba(255, 255, 255, .82);
                font-weight: 600;
                border-radius: 999px;
                padding: .45rem .85rem;
                transition: background-color .15s ease, color .15s ease;
            }

            .sg-navbar .nav-link:hover,
            .sg-navbar .nav-link:focus {
                color: #fff;
                background: rgba(255, 255, 255, .08);
            }

            .sg-navbar .nav-link.active {
                color: #10171a;
                background: #1fc07a;
            }

            .sg-navbar .navbar-toggler {
                border-color: rgba(255, 255, 255, .2);
            }

            .sg-navbar .navbar-toggler:focus {
                box-shadow: 0 0 0 .2rem rgba(31, 192, 122, .35);
            }

            .sg-navbar .navbar-toggler-icon {
                filter: invert(1);
            }
        </style>
    </th:block>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top sg-navbar" th:fragment="navbar(activePage)">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand" th:href="@{/directory}">Find Groups</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar" sec:authorize="isAuthenticated()">
            <ul class="navbar-nav ms-auto gap-1 py-2 py-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/directory}"
                       th:classappend="${activePage == 'directory'} ? ' active' : ''">Directory</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('MANAGE_GROUPS')">
                    <a class="nav-link" th:href="@{/groups}"
                       th:classappend="${activePage == 'manageGroups'} ? ' active' : ''">Manage Groups</a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('MANAGE_LEADERS')">
                    <a class="nav-link" th:href="@{/leaders}"
                       th:classappend="${activePage == 'manageLeaders'} ? ' active' : ''">Manage Leaders</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/logout}">Sign Out</a>
                </li>
            </ul>
        </div>

        <a class="nav-link ms-auto" th:href="@{/login}" sec:authorize="isAnonymous()">Sign In</a>
    </div>
</nav>
</body>
</html>
