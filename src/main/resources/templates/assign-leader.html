<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Leader</title>
    <th:block th:insert="~{fragments/css-links :: cssLinks}"></th:block>
    <link rel="stylesheet" th:href="@{/css/forms.css}" href="/css/forms.css" />
</head>

<body>
<th:block th:insert="~{fragments/navbar :: navbar('manageLeaders')}"></th:block>

<main class="page-shell">
    <section class="page-header">
        <span class="eyebrow"><i class="fa-solid fa-compass"></i> Group Directory</span>
        <h1>Assign User as Leader</h1>
        <p>
            Filter by user email. Only users that are members of your church will be shown.
        </p>
    </section>

    <div class="mb-3">
        <a class="btn btn-outline-secondary" th:href="@{/leaders}">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to Manage Leaders
        </a>
    </div>

    <section class="surface-card">
        <h2 class="section-title">Find a Member</h2>
        <p class="section-subtitle">Start typing an email address to filter members.</p>

        <label class="form-label visually-hidden" for="userEmailSearch">Leader email</label>
        <input id="userEmailSearch"
               name="email"
               type="search"
               class="form-control search-input"
               placeholder="user@church.org"
               autocomplete="off">
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
