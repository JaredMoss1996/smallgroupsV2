<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Leader</title>

    <th:block th:insert="~{fragments/navbar :: navbarCss}"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(31, 192, 122, 0.1), transparent 30%),
                linear-gradient(180deg, #f8fbfc 0%, #f4f7f8 100%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #222;
            display: flex;
            flex-direction: column;
        }

        .page-shell {
            width: min(1100px, calc(100% - 32px));
            margin: 26px auto 42px;
        }

        .hero-card {
            border-radius: 16px;
            background: linear-gradient(135deg, #10171a 0%, #1a2428 100%);
            color: #fff;
            padding: 1.45rem;
            box-shadow: 0 12px 30px rgba(16, 23, 26, .24);
            margin-bottom: 1rem;
        }

        .hero-card h1 {
            margin: 0;
            font-size: clamp(1.2rem, 2.3vw, 1.8rem);
            font-weight: 800;
        }

        .hero-copy {
            margin-top: .55rem;
            margin-bottom: 0;
            color: rgba(255, 255, 255, .84);
        }

        .surface-card {
            background: #fff;
            border: 1px solid #e5edf2;
            border-radius: 14px;
            padding: 1.1rem;
            box-shadow: 0 8px 22px rgba(18, 22, 24, .06);
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1.03rem;
            font-weight: 700;
            margin-bottom: .35rem;
        }

        .section-subtitle {
            margin-bottom: .9rem;
            color: #64748b;
            font-size: .93rem;
        }

        .search-input {
            border-radius: 999px;
            padding: .72rem 1rem;
        }

        .results-wrap {
            margin-top: .95rem;
            max-height: 360px;
            overflow-y: auto;
            padding-right: .2rem;
        }

        .empty-state {
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 1rem;
            color: #64748b;
            background: #f8fafc;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: .65rem;
            margin-top: .75rem;
        }

        .preview-item {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            padding: .65rem .7rem;
        }

        .preview-label {
            display: block;
            color: #64748b;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .03em;
            margin-bottom: .12rem;
        }

        .preview-value {
            font-weight: 600;
            color: #0f172a;
        }

        .htmx-indicator {
            display: none;
        }

        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-flex;
        }

        @media (max-width: 900px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
        }


        .page-header {
            background: linear-gradient(135deg, #10171a 0%, #1b2a31 100%);
            color: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(16, 23, 26, 0.20);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .page-header::after {
            content: "";
            position: absolute;
            inset: auto -80px -80px auto;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(31, 192, 122, 0.12);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.10);
            color: #d7fbe9;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .page-header h1 {
            margin: 0 0 10px;
            font-size: clamp(1.9rem, 4vw, 2.7rem);
            line-height: 1.1;
        }

        .page-header p {
            margin: 0;
            max-width: 760px;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.65;
        }

    </style>
</head>

<body>
<th:block th:insert="~{fragments/navbar :: navbar('manageLeaders')}"></th:block>

<main class="page-shell">
    <section class="page-header">
        <span class="eyebrow"><i class="fa-solid fa-compass"></i> Group Directory</span>
        <h1>Assign User as Leader</h1>
        <p>
            Filter by user email. Only users that are members of your church will be shown.
        </p>
    </section>

    <div class="mb-3">
        <a class="btn btn-outline-secondary" th:href="@{/leaders}">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to Manage Leaders
        </a>
    </div>

    <section class="surface-card">
        <h2 class="section-title">Find a Leader</h2>
        <p class="section-subtitle">Start typing an email address to filter leaders.</p>

        <label class="form-label visually-hidden" for="userEmailSearch">Leader email</label>
        <input id="userEmailSearch"
               name="email"
               type="search"
               class="form-control search-input"
               placeholder="user@church.org"
               autocomplete="off">
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
