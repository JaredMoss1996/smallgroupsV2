<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Profile</title>
    <th:block th:insert="~{fragments/css-links :: cssLinks}"></th:block>
    <style>

        .profile-card {
            padding: 8px;
        }
        .profile-row {
            display: grid;
            grid-template-columns: 170px 1fr;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 16px;
        }
        .profile-row:last-child {
            border-bottom: none;
        }
        .profile-label {
            margin: 0;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--muted);
            font-weight: 700;
        }
        .profile-value {
            margin: 0;
            font-size: 1rem;
            color: var(--text);
            font-weight: 600;
            word-break: break-word;
        }
        .muted-value {
            color: var(--muted);
            font-weight: 500;
        }

        .profile-signout-btn {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 720px) {
            .profile-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<th:block th:insert="~{fragments/navbar :: navbar('profile')}"></th:block>
<main class="page-shell">
    <section class="page-header">
        <span class="eyebrow"><i class="fa-solid fa-user"></i> Account</span>
        <h1>My Profile</h1>
        <p>Review your profile details and contact information.</p>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm mt-3 profile-signout-btn">
            <i class="fa-solid fa-right-from-bracket me-1"></i> Sign Out
        </a>
    </section>
    <section class="profile-card" aria-label="Profile details">
        <div class="profile-row">
            <p class="profile-label">Full Name</p>
            <p class="profile-value" th:text="${member.firstName + ' ' + member.lastName}">Name</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Email</p>
            <p class="profile-value" th:text="${member.email}">email</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Mobile Phone</p>
            <p class="profile-value" th:text="${member.mobilePhone ?: 'Not provided'}">Not provided</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Home Phone</p>
            <p class="profile-value" th:text="${member.homePhone ?: 'Not provided'}">Not provided</p>
        </div>
        <div class="profile-row">
            <p class="profile-label">Church ID</p>
            <p class="profile-value muted-value" th:text="${member.churchId}">0</p>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
