<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>

    <style>
        .error-card {
            width: min(92vw, 560px);
        }

        .error-card h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        .error-card p {
            margin: 0 0 12px;
            line-height: 1.5;
        }

        .error-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .error-actions a {
            text-decoration: none;
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            color: #111827;
            font-weight: 600;
        }

        .error-actions a.primary {
            background: #111827;
            color: #ffffff;
            border-color: #111827;
        }
    </style>
</head>
<body class="auth-page">
<main class="auth-card error-card">
    <h1>403</h1>
    <p><strong>Access denied.</strong> Your account does not have permission to open this page.</p>
    <p>If you think this is a mistake, contact an administrator and ask for the required role.</p>
    <div class="error-actions">
        <a class="primary" href="/">Go to Home</a>
        <a href="/directory">Open Directory</a>
    </div>
</main>
</body>
</html>
