<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Groups</title>

    <th:block th:insert="fragments/navbar :: navbarCss"></th:block>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            height: 100vh;
        }

        body {
            height: 100vh;
            margin: 0;
            padding: 0;
            background: #f4f7f8;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #222;
            display: flex;
            flex-direction: column;
        }


        /* Sidebar filters card */
        .filters-card {
            background: #10171a;
            color: #fff;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 6px 18px rgba(15, 22, 27, .25);
        }

        .filters-card .section-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: .75rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .filters-card .form-control,
        .filters-card .btn {
            border-radius: 999px;
        }

        .filters-card .small-muted {
            color: rgba(255, 255, 255, .6);
            font-size: .9rem;
        }

        .filter-row {
            border-top: 1px solid rgba(255, 255, 255, .06);
            padding-top: .8rem;
            margin-top: .6rem;
        }

        .toggle {
            width: 42px;
            height: 24px;
            border-radius: 999px;
            background: #e6e6e6;
            position: relative;
            display: inline-block;
            vertical-align: middle;
        }

        .toggle::after {
            content: "";
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            left: 3px;
            top: 3px;
            transition: left .18s;
        }

        .toggle.on {
            background: #1fc07a;
        }

        .toggle.on::after {
            left: 21px;
        }

        /* Results area */
        .results-count {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: .5rem;
        }

        .group-card {
            border-radius: 12px;
            background: #fff;
            padding: 1.15rem;
            box-shadow: 0 6px 18px rgba(18, 22, 24, .06);
            position: relative;
            min-height: 170px;
            margin-bottom: 20px;
        }

        .group-card--with-actions {
            padding-right: 6.5rem;
        }

        .group-card:hover {
            box-shadow: 0 8px 24px rgba(18, 22, 24, .12);
            cursor: pointer;
        }

        .group-card-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: .5rem;
            z-index: 2;
        }

        .group-card-delete-btn,
        .group-card-edit-btn {
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
            border-radius: 8px;
            background: #ffffff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            padding: .45rem .8rem;
            white-space: nowrap;
        }

        .group-card-delete-btn:hover,
        .group-card-edit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(15, 23, 42, .12);
        }

        .group-card-delete-btn {
            background: #dc2626;
            color: #fff;
        }

        .group-card-delete-btn:hover {
            background: #b91c1c;
        }

        .group-card-edit-btn:hover {
            background: #eff6ff;
        }

        .group-card .star {
            position: absolute;
            right: 14px;
            top: 12px;
            color: #9aa4a9;
        }

        .group-title {
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: .5rem;
        }

        .badges .badge {
            margin-right: .35rem;
            background: #e7f6ee;
            color: #0a6b3d;
            font-weight: 600;
        }

        .meta-line {
            color: #2563eb;
            margin-bottom: .3rem;
            display: flex;
            gap: .5rem;
            align-items: center;
        }

        .meta-desc {
            color: #334155;
            margin-top: .5rem;
        }

        .leader-pill {
            background: #eef6fb;
            color: #0b4e78;
            border-radius: 999px;
            padding: .25rem .5rem;
            font-weight: 600;
            margin-right: .35rem;
            display: inline-block;
        }

        .filter-option {
            padding-left: 2em;
        }

        /* Collapsible filter sections */
        .filter-header {
            cursor: pointer;
            user-select: none;
            /* margin-bottom: 1rem; */
        }

        .filter-header i {
            transition: transform 0.2s ease-in-out;
        }

        .filter-header.collapsed i {
            transform: rotate(90deg);
        }

        .filter-checkbox-group {
            display: grid;
            flex-direction: column;
            gap: 0.6rem;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            margin-top: .5rem;
            gap: 16px;
        }

        .filter-checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .filter-checkbox-item input[type="radio"],
        .filter-checkbox-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: #1fc07a;
        }

        .filter-checkbox-item label {
            cursor: pointer;
            margin: 0;
            font-size: 0.9rem;
        }

        /* Mobile filter button */
        .mobile-filter-header {
            display: none;
            background: #fff;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 1rem;
        }

        .filter-toggle-btn {
            background: #10171a;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-toggle-btn:hover {
            background: #1a2428;
        }

        /* Offcanvas for mobile filters */
        .offcanvas-filter {
            width: auto;
            max-width: none;
        }

        .offcanvas-filter .offcanvas-header {
            background: #10171a;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .offcanvas-filter .offcanvas-body {
            padding: 0;
            background: #10171a;
        }

        .offcanvas-filter .filters-card {
            box-shadow: none;
            border-radius: 0;
        }

        /* Masonry-style results grid */
        .results-grid {
            display: block;
            column-count: 2;
            column-gap: 20px;
            margin-left: 0;
            margin-right: 0;
            margin-bottom: 20px;
        }

        .results-grid>.col {
            break-inside: avoid;
            margin-bottom: 20px;
            width: 100%;
        }

        .desktop-filters {
            flex: 0 0 auto;
            width: 100%;
            max-width: 33.333%;
            position: sticky;
            top: 20px;
            align-self: flex-start;
        }

        @media (max-width: 767.98px) {
            .results-grid {
                column-count: 1;
            }
        }

        @media (max-width: 991.99px) {
            .offcanvas-filter {
                width: 85% !important;
                max-width: 320px;
            }

            .mobile-filter-header {
                display: block;
                position: fixed;
                z-index: 10000;
                width: 100%;
            }

            .desktop-filters {
                display: none !important;
            }

            #content-body {
                margin-top: 30px;
            }
        }

        @media (min-width: 992px) {
            .offcanvas-filter {
                position: relative !important;
                width: 100% !important;
                max-width: none !important;
                transform: none !important;
                visibility: visible !important;
                border: none !important;
            }

            .offcanvas-filter .offcanvas-header {
                display: none;
            }

            .mobile-filter-header {
                display: none !important;
            }

            .offcanvas-filter .offcanvas-body {
                overflow: visible !important;
            }

            #filterOffcanvas {
                display: none !important;
            }
        }

        /* Blur everything behind the overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Centered cloned element */
        #preview {
            background: white;
            padding: 32px;
            border-radius: 8px;
            margin: 15px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        /* Close button inside preview */
        .preview-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 1100;
        }

        /* Category badges (new) */
        .category-name {
            background: #eef2ff;
            /* subtle indigo tint */
            color: #3730a3;
            /* darker indigo */
            border-radius: 999px;
            padding: .22rem .6rem;
            font-weight: 700;
            font-size: .8rem;
            margin-right: .35rem;
            display: inline-block;
            margin-top: .35rem;
        }

        .group-card .categories {
            margin-top: .45rem;
            margin-bottom: .45rem;
        }
    </style>

</head>

<body>

<th:block th:insert="fragments/navbar :: navbar('manageGroups')"></th:block>

<!-- Overlay Controller -->
<div id="overlay" onclick="closePreview()">
    <div id="preview">
        <!-- Persistent close button in the top-right of the preview -->
        <button type="button" class="btn-close preview-close-btn" aria-label="Close"
                onclick="event.stopPropagation(); closePreview();"></button>
        <!-- Inner container where cloned group-card will be inserted so the close button isn't removed -->
        <div id="preview-inner"></div>
    </div>
</div>

<!-- Mobile Filter Button Go Here-->

<!-- Offcanvas for mobile Go Here-->


<div class="pt-5 flex-grow-1 d-flex px-3 px-lg-4" id="content-body">
    <div style="display: flex; flex: 1; max-width: 1400px; margin: 0 auto;">
        <!-- Left Filters Go Here-->

        <!-- Right: Results -->
        <div class="d-flex flex-column overflow-auto" style="flex: 1; min-width: 0;">
            <div class="mb-3">
                <div class="results-count">[[${groups.size}]] Results:</div>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-2 results-grid">
                <div class="col" th:each="group : ${groups}" th:object="${group}">
                    <th:block th:insert="fragments/group-card :: groupCard(${group}, true)"></th:block>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/directory.js}"></script>
</body>

</html>
